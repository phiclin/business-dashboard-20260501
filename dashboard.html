<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg-primary: #0a0e17;
  --bg-secondary: #111827;
  --bg-card: #1a1f2e;
  --border: #1e2a3a;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --accent-blue: #3b82f6;
  --accent-cyan: #06b6d4;
  --accent-green: #10b981;
  --accent-orange: #f59e0b;
  --accent-red: #ef4444;
  --accent-purple: #8b5cf6;
  --accent-pink: #ec4899;
}
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  min-height: 100vh; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:

    radial-gradient(ellipse at 80% 20%, rgba(139,92,246,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 80%, rgba(6,182,212,0.05) 0%, transparent 50%);

}
.header { position: relative; z-index: 1; padding: 24px 32px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, rgba(17,24,39,0.95) 0%, rgba(10,14,23,0) 100%); }
.header-left { display: flex; align-items: center; gap: 16px; }
.logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 0 20px rgba(59,130,246,0.3); }

.header-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 16px; }

.container { position: relative; z-index: 1; padding: 20px 32px 32px; max-width: 1600px; margin: 0 auto; }
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }

.kpi-card:hover { transform: translateY(-2px); box-shadow: 0 4px 24px rgba(0,0,0,0.3); }
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%; border-radius: 4px 0 0 4px; }
.kpi-card:nth-child(1)::before { background: var(--accent-blue); }
.kpi-card:nth-child(2)::before { background: var(--accent-orange); }
.kpi-card:nth-child(3)::before { background: var(--accent-red); }
.kpi-card:nth-child(4)::before { background: var(--accent-purple); }
.kpi-card:nth-child(5)::before { background: var(--accent-cyan); }
.kpi-card:nth-child(6)::before { background: var(--accent-green); }
.kpi-card:nth-child(7)::before { background: var(--accent-pink); }
.kpi-card:nth-child(8)::before { background: var(--accent-blue); }
.kpi-label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.kpi-value { font-size: 28px; font-weight: 700; }
.kpi-sub { font-size: 11px; color: var(--text-secondary); margin-top: 4px; }
.kpi-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); font-size: 32px; opacity: 0.15; }
.chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; min-height: 380px; }
.chart-card.full-width { grid-column: 1 / -1; min-height: 400px; }
.chart-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
.chart-title::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 2px; background: var(--accent-blue); }
.chart-body { width: 100%; height: calc(100% - 32px); min-height: 320px; }
.footer { text-align: center; padding: 16px; color: var(--text-secondary); font-size: 11px; border-top: 1px solid var(--border); position: relative; z-index: 1; }
.loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-primary); display: flex; align-items: center; justify-content: center; z-index: 999; transition: opacity 0.5s; }
.loading-overlay.hidden { opacity: 0; pointer-events: none; }
.loading-spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent-blue); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
@media (max-width: 1200px) { .kpi-grid { grid-template-columns: repeat(2, 1fr); } .chart-grid { grid-template-columns: 1fr; } }
@media (max-width: 768px) { .kpi-grid { grid-template-columns: 1fr; } .header { flex-direction: column; gap: 12px; align-items: flex-start; } .container { padding: 16px; } }
</style>
</head>

    series:[{type:'treemap',data:d.map(function(x,i){return{name:x.name,value:x.amount,itemStyle:{color:C[i]}}}),label:{color:'#fff',fontSize:11,formatter:'{b}'},upperLabel:{show:!0,height:24,color:'#94a3b8',fontSize:10},roam:!1,nodeClick:!1,breadcrumb:{show:!1},levels:[{itemStyle:{borderColor:'#0a0e17',borderWidth:2,gapWidth:2}}]}]})
}
function nodeStatus(){
  var c=I('chartNodeStatus');
  var d=D.nodeStatus.filter(function(x){return x.count>10});
  var t=d.reduce(function(s,x){return s+x.count},0);
  c.setOption({tooltip:Object.assign({},T,{formatter:function(p){return p.name+'<br/>笔数: '+p.value+'<br/>占比: '+(p.value/t*100).toFixed(1)+'%'}}),
    series:[{type:'pie',radius:['50%','78%'],center:['50%','55%'],data:d.map(function(x,i){return{name:x.name,value:x.count,itemStyle:{color:C[i]}}}),label:{color:'#94a3b8',fontSize:10,formatter:'{b}\n{d}%'}}]})
}
function quarterly(){
  var c=I('chartQuarterly');
  var q=D.quarterlyForecast;
  var t=q.q1+q.q2+q.q3+q.q4;
  c.setOption({tooltip:T,grid:{left:'3%',right:'8%',top:40,bottom:30},
    xAxis:{type:'category',data:['Q1','Q2','Q3','Q4'],axisLabel:{color:'#94a3b8',fontSize:12,fontWeight:'bold'}},
    yAxis:{type:'value',name:'万元',nameTextStyle:{color:'#94a3b8',fontSize:11},axisLabel:AL,splitLine:{lineStyle:{color:'rgba(30,42,58,0.6)'}}},
    series:[{type:'bar',data:[
      {value:q.q1,itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#3b82f6'},{offset:1,color:'#1d4ed8'}])}},
      {value:q.q2,itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#06b6d4'},{offset:1,color:'#0e7490'}])}},
      {value:q.q3,itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#10b981'},{offset:1,color:'#047857'}])}},
      {value:q.q4,itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#8b5cf6'},{offset:1,color:'#6d28d9'}])}}
    ],barWidth:40,itemStyle:{borderRadius:[8,8,0,0]},label:{show:!0,position:'top',color:'#e2e8f0',fontSize:12,fontWeight:'bold',formatter:function(p){return p.value+'万'}}},
    {type:'line',data:[q.q1,q.q2,q.q3,q.q4],lineStyle:{color:'#f59e0b',width:2,type:'dashed'},symbol:'diamond',symbolSize:12,itemStyle:{color:'#f59e0b'}}],
    graphic:[{type:'text',left:'center',top:5,style:{text:'全年预测: '+t+' 万元',fill:'#f59e0b',fontSize:13,fontWeight:'bold'}}]})
}
function marketing(){
  var c=I('chartMarketing');
  var d=D.marketing.filter(function(x){return x.base>0}).slice(0,9).reverse();
  c.setOption({tooltip:T,legend:{data:['基础盘','已转化','已回款','预测转化'],bottom:0,textStyle:{color:'#94a3b8',fontSize:11}},
    grid:{left:150,right:'5%',top:10,bottom:40},
    xAxis:{type:'value',name:'万元',nameTextStyle:{color:'#94a3b8',fontSize:11},axisLabel:AL,splitLine:{lineStyle:{color:'rgba(30,42,58,0.6)'}}},
    yAxis:{type:'category',data:d.map(function(x){return x.name}),axisLabel:{color:'#94a3b8',fontSize:10}},
    series:[
      {name:'基础盘',type:'bar',data:d.map(function(x){return x.base}),barWidth:14,itemStyle:{color:'#3b82f6',borderRadius:[0,2,2,0]}},
      {name:'已转化',type:'bar',data:d.map(function(x){return x.converted}),barWidth:14,itemStyle:{color:'#10b981',borderRadius:[0,2,2,0]}},
      {name:'已回款',type:'bar',data:d.map(function(x){return x.collected}),barWidth:14,itemStyle:{color:'#06b6d4',borderRadius:[0,2,2,0]}},
      {name:'预测转化',type:'bar',data:d.map(function(x){return x.predicted}),barWidth:14,itemStyle:{color:'#f59e0b',borderRadius:[0,2,2,0]}}
    ]})
}
</script>
